name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Collect jars
        run: |
          mkdir -p release-jars
          cp versions/1.21.10/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.9/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.8/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.7/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.6/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.5/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.4/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.3/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.2/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.21.1/build/libs/*[0-9].jar release-jars/ 2>/dev/null || true
          cp versions/1.20.4/build/libs/*[0-9].jar  release-jars/ 2>/dev/null || true
          cp versions/1.20.1/build/libs/*[0-9].jar  release-jars/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-jars/*.jar
          generate_release_notes: true